server:
  port: 8080

spring:
  application:
    name: byw-gateway
  codec:
    max-in-memory-size: 50MB
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yml
    gateway:
      routes:
        - id: byw-admin-auth
          uri: lb://byw-auth
          predicates:
            - Path=/api/admin/auth/**
          filters:
            - StripPrefix=2

        - id: byw-admin
          uri: lb://byw-admin
          predicates:
            - Path=/api/admin/**
          filters:
            - StripPrefix=1

        - id: byw-auth
          uri: lb://byw-auth
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        - id: byw-user
          uri: lb://byw-user
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1

        - id: byw-product
          uri: lb://byw-product
          predicates:
            - Path=/api/product/**,/api/category/**,/api/search/**,/api/brand/**,/api/banner/**
          filters:
            - StripPrefix=1

        - id: byw-cart
          uri: lb://byw-cart
          predicates:
            - Path=/api/cart/**
          filters:
            - StripPrefix=1

        - id: byw-order
          uri: lb://byw-order
          predicates:
            - Path=/api/order/**
          filters:
            - StripPrefix=1

        - id: byw-pay
          uri: lb://byw-pay
          predicates:
            - Path=/api/pay/**
          filters:
            - StripPrefix=1

        - id: byw-logistics
          uri: lb://byw-logistics
          predicates:
            - Path=/api/logistics/**
          filters:
            - StripPrefix=1

        - id: byw-review
          uri: lb://byw-review
          predicates:
            - Path=/api/review/**
          filters:
            - StripPrefix=1

        - id: byw-promotion
          uri: lb://byw-promotion
          predicates:
            - Path=/api/promotion/**,/api/coupon/**,/api/seckill/**
          filters:
            - StripPrefix=1

        - id: byw-file
          uri: lb://byw-file
          predicates:
            - Path=/api/file/**
          filters:
            - StripPrefix=1

        - id: api-docs-auth
          uri: lb://byw-auth
          predicates:
            - Path=/v3/api-docs/byw-auth
          filters:
            - RewritePath=/v3/api-docs/byw-auth, /v3/api-docs

        - id: api-docs-user
          uri: lb://byw-user
          predicates:
            - Path=/v3/api-docs/byw-user
          filters:
            - RewritePath=/v3/api-docs/byw-user, /v3/api-docs

        - id: api-docs-product
          uri: lb://byw-product
          predicates:
            - Path=/v3/api-docs/byw-product
          filters:
            - RewritePath=/v3/api-docs/byw-product, /v3/api-docs

        - id: api-docs-cart
          uri: lb://byw-cart
          predicates:
            - Path=/v3/api-docs/byw-cart
          filters:
            - RewritePath=/v3/api-docs/byw-cart, /v3/api-docs

        - id: api-docs-order
          uri: lb://byw-order
          predicates:
            - Path=/v3/api-docs/byw-order
          filters:
            - RewritePath=/v3/api-docs/byw-order, /v3/api-docs

        - id: api-docs-pay
          uri: lb://byw-pay
          predicates:
            - Path=/v3/api-docs/byw-pay
          filters:
            - RewritePath=/v3/api-docs/byw-pay, /v3/api-docs

        - id: api-docs-logistics
          uri: lb://byw-logistics
          predicates:
            - Path=/v3/api-docs/byw-logistics
          filters:
            - RewritePath=/v3/api-docs/byw-logistics, /v3/api-docs

        - id: api-docs-review
          uri: lb://byw-review
          predicates:
            - Path=/v3/api-docs/byw-review
          filters:
            - RewritePath=/v3/api-docs/byw-review, /v3/api-docs

        - id: api-docs-promotion
          uri: lb://byw-promotion
          predicates:
            - Path=/v3/api-docs/byw-promotion
          filters:
            - RewritePath=/v3/api-docs/byw-promotion, /v3/api-docs

        - id: api-docs-file
          uri: lb://byw-file
          predicates:
            - Path=/v3/api-docs/byw-file
          filters:
            - RewritePath=/v3/api-docs/byw-file, /v3/api-docs

        - id: api-docs-admin
          uri: lb://byw-admin
          predicates:
            - Path=/v3/api-docs/byw-admin
          filters:
            - RewritePath=/v3/api-docs/byw-admin, /v3/api-docs

    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}

byw:
  jwt:
    secret: buyyouwant-secret-key-must-be-at-least-256-bits-long-for-hs256
    expiration: 86400000

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    urls:
      - name: Auth Service
        url: /v3/api-docs/byw-auth
      - name: User Service
        url: /v3/api-docs/byw-user
      - name: Product Service
        url: /v3/api-docs/byw-product
      - name: Cart Service
        url: /v3/api-docs/byw-cart
      - name: Order Service
        url: /v3/api-docs/byw-order
      - name: Pay Service
        url: /v3/api-docs/byw-pay
      - name: Logistics Service
        url: /v3/api-docs/byw-logistics
      - name: Review Service
        url: /v3/api-docs/byw-review
      - name: Promotion Service
        url: /v3/api-docs/byw-promotion
      - name: File Service
        url: /v3/api-docs/byw-file
      - name: Admin BFF
        url: /v3/api-docs/byw-admin
